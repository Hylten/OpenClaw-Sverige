<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&amp;display=swap');
      .handwritten { font-family: 'Caveat', cursive; fill: #2d3748; }
      .small { font-size: 11px; fill: #718096; }
      .checkmark { font-size: 16px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="300" fill="#f7fafc"/>
  
  <!-- Title -->
  <text x="250" y="35" class="handwritten" font-size="22" text-anchor="middle" fill="#1a202c" font-weight="bold">AI-agenten arbetar dygnet runt</text>
  
  <!-- Clock in center -->
  <circle cx="250" cy="160" r="60" fill="white" stroke="#3182ce" stroke-width="3"/>
  <circle cx="250" cy="160" r="55" fill="none" stroke="#bee3f8" stroke-width="1"/>
  
  <!-- Clock hands -->
  <line x1="250" y1="160" x2="250" y2="115" stroke="#2b6cb0" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="160" x2="280" y2="160" stroke="#3182ce" stroke-width="2" stroke-linecap="round"/>
  <circle cx="250" cy="160" r="5" fill="#2b6cb0"/>
  
  <!-- Hour markers -->
  <g stroke="#a0aec0" stroke-width="2">
    <line x1="250" y1="105" x2="250" y2="112"/>
    <line x1="295" y1="160" x2="288" y2="160"/>
    <line x1="250" y1="215" x2="250" y2="208"/>
    <line x1="205" y1="160" x2="212" y2="160"/>
  </g>
  
  <!-- Robot/Ai icon in clock -->
  <circle cx="250" cy="150" r="12" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <circle cx="246" cy="148" r="2" fill="#3182ce"/>
  <circle cx="254" cy="148" r="2" fill="#3182ce"/>
  <path d="M 246 154 Q 250 157, 254 154" stroke="#3182ce" stroke-width="1.5" fill="none"/>
  
  <!-- Antenna -->
  <line x1="250" y1="138" x2="250" y2="125" stroke="#3182ce" stroke-width="2"/>
  <circle cx="250" cy="122" r="4" fill="#48bb78"/>
  
  <!-- 24h indicators around clock -->
  <text x="250" y="85" class="small" text-anchor="middle">00:00</text>
  <text x="310" y="125" class="small" text-anchor="middle">06:00</text>
  <text x="320" y="165" class="small" text-anchor="middle">12:00</text>
  <text x="310" y="210" class="small" text-anchor="middle">18:00</text>
  
  <!-- Bottom text boxes -->
  <g transform="translate(30, 240)">
    <!-- Always on -->
    <rect x="0" y="0" width="130" height="45" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
    <text x="65" y="20" class="handwritten" font-size="13" text-anchor="middle" fill="#2b6cb0" font-weight="bold">Alltid tillgänglig</text>
    <text x="65" y="38" class="small" text-anchor="middle">Även när du sover</text>
  </g>
  
  <g transform="translate(185, 240)">
    <!-- No breaks -->
    <rect x="0" y="0" width="130" height="45" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5"/>
    <text x="65" y="20" class="handwritten" font-size="13" text-anchor="middle" fill="#276749" font-weight="bold">Inga pauser</text>
    <text x="65" y="38" class="small" text-anchor="middle">Arbetar konstant</text>
  </g>
  
  <g transform="translate(340, 240)">
    <!-- Consistent -->
    <rect x="0" y="0" width="130" height="45" rx="8" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5"/>
    <text x="65" y="20" class="handwritten" font-size="13" text-anchor="middle" fill="#6b46c1" font-weight="bold">Konsekvent</text>
    <text x="65" y="38" class="small" text-anchor="middle">Samma kvalitet alltid</text>
  </g>
  
  <!-- Sun and Moon icons -->
  <text x="170" y="120" font-size="20">☀️</text>
  <text x="315" y="195" font-size="20">🌙</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="60" r="8" fill="#e6fffa"/>
  <circle cx="450" cy="60" r="8" fill="#fff5f5"/>
  <circle cx="50" cy="220" r="6" fill="#faf5ff"/>
  <circle cx="450" cy="220" r="6" fill="#fffaf0"/>
</svg>
