<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&amp;display=swap');
      .handwritten { font-family: 'Caveat', cursive; fill: #2d3748; }
      .step-num { font-size: 12px; fill: white; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#f7fafc"/>
  
  <!-- Title -->
  <text x="250" y="35" class="handwritten" font-size="24" text-anchor="middle" fill="#1a202c" font-weight="bold">Så här arbetar en AI-agent</text>
  
  <!-- Step 1: Mål -->
  <circle cx="70" cy="90" r="22" fill="#4299e1" stroke="#2b6cb0" stroke-width="2"/>
  <text x="70" y="95" class="step-num" text-anchor="middle">1</text>
  <rect x="95" y="75" width="90" height="30" rx="6" fill="white" stroke="#4299e1" stroke-width="1.5"/>
  <text x="140" y="95" class="handwritten" font-size="14" text-anchor="middle">Du anger målet</text>
  
  <!-- Arrow down 1 -->
  <path d="M 70 115 L 70 135" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Planering -->
  <circle cx="70" cy="160" r="22" fill="#48bb78" stroke="#38a169" stroke-width="2"/>
  <text x="70" y="165" class="step-num" text-anchor="middle">2</text>
  <rect x="95" y="145" width="90" height="30" rx="6" fill="white" stroke="#48bb78" stroke-width="1.5"/>
  <text x="140" y="165" class="handwritten" font-size="14" text-anchor="middle">Agenten planerar</text>
  
  <!-- Sub-steps (flowchart style) -->
  <g transform="translate(210, 70)">
    <!-- Mini flowchart -->
    <rect x="0" y="0" width="70" height="25" rx="4" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5"/>
    <text x="35" y="17" class="handwritten" font-size="11" text-anchor="middle">Samla data</text>
    
    <rect x="0" y="35" width="70" height="25" rx="4" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5"/>
    <text x="35" y="52" class="handwritten" font-size="11" text-anchor="middle">Sortera info</text>
    
    <rect x="0" y="70" width="70" height="25" rx="4" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5"/>
    <text x="35" y="87" class="handwritten" font-size="11" text-anchor="middle">Analysera</text>
    
    <rect x="0" y="105" width="70" height="25" rx="4" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5"/>
    <text x="35" y="122" class="handwritten" font-size="11" text-anchor="middle">Skapa utkast</text>
    
    <!-- Connecting lines -->
    <path d="M 35 25 L 35 35" stroke="#38b2ac" stroke-width="1.5"/>
    <path d="M 35 60 L 35 70" stroke="#38b2ac" stroke-width="1.5"/>
    <path d="M 35 95 L 35 105" stroke="#38b2ac" stroke-width="1.5"/>
  </g>
  
  <!-- Arrow down 2 -->
  <path d="M 70 193 L 70 215" stroke="#a0aec0" stroke-width="2"/>
  
  <!-- Step 3: Genomför -->
  <circle cx="70" cy="240" r="22" fill="#ed8936" stroke="#dd6b20" stroke-width="2"/>
  <text x="70" y="245" class="step-num" text-anchor="middle">3</text>
  <rect x="95" y="225" width="90" height="30" rx="6" fill="white" stroke="#ed8936" stroke-width="1.5"/>
  <text x="140" y="245" class="handwritten" font-size="14" text-anchor="middle">Genomför arbetet</text>
  
  <!-- Tools icons -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="45" height="45" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5"/>
    <text x="22" y="28" class="handwritten" font-size="18" text-anchor="middle">📧</text>
    
    <rect x="55" y="0" width="45" height="45" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5"/>
    <text x="77" y="28" class="handwritten" font-size="18" text-anchor="middle">📊</text>
    
    <rect x="0" y="55" width="45" height="45" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5"/>
    <text x="22" y="83" class="handwritten" font-size="18" text-anchor="middle">📁</text>
    
    <rect x="55" y="55" width="45" height="45" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5"/>
    <text x="77" y="83" class="handwritten" font-size="18" text-anchor="middle">📅</text>
  </g>
  <text x="350" y="145" class="handwritten" font-size="12" text-anchor="middle" fill="#744210">Verktyg</text>
  
  <!-- Arrow down 3 -->
  <path d="M 70 273 L 70 295" stroke="#a0aec0" stroke-width="2"/>
  
  <!-- Step 4: Resultat -->
  <circle cx="70" cy="320" r="22" fill="#9f7aea" stroke="#805ad5" stroke-width="2"/>
  <text x="70" y="325" class="step-num" text-anchor="middle">4</text>
  <rect x="95" y="305" width="90" height="30" rx="6" fill="white" stroke="#9f7aea" stroke-width="1.5"/>
  <text x="140" y="325" class="handwritten" font-size="14" text-anchor="middle">Resultat klart!</text>
  
  <!-- Checkmark -->
  <circle cx="400" cy="310" r="35" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <path d="M 380 310 L 393 323 L 423 290" stroke="#48bb78" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Decorative elements -->
  <circle cx="450" cy="60" r="15" fill="#ebf8ff" stroke="#bee3f8"/>
  <circle cx="30" cy="50" r="10" fill="#faf5ff" stroke="#e9d8fd"/>
  <circle cx="470" cy="180" r="12" fill="#fffaf0" stroke="#feebc8"/>
</svg>
